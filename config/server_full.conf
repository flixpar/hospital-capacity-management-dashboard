worker_processes auto;
worker_rlimit_nofile 65535;

events {
	worker_connections 1024;
	use epoll;
	multi_accept on;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	charset utf-8;

	# Logging
	log_format custom_log_fmt	'$remote_addr - $remote_user [$time_local] '
								'"$request" $status $body_bytes_sent '
								'"$http_referer" "$http_user_agent" '
								'- $upstream_connect_time $upstream_header_time '
								'$upstream_response_time $request_time';
	error_log  /var/log/nginx/hcm-dashboard.error.log  warn;
	access_log /var/log/nginx/hcm-dashboard.access.log custom_log_fmt;

	# Security
	server_tokens off;

	# Rate limiting
	limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
	limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

	# Gzip compression
	gzip on;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
	gzip_vary on;
	gzip_min_length 1024;
	gzip_proxied any;
	gzip_comp_level 6;


	# Performance optimizations
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 240;
	keepalive_requests 1000;

	# Buffer sizes
	client_body_buffer_size 128k;
	client_max_body_size 10m;
	client_header_buffer_size 1k;
	large_client_header_buffers 4 4k;
	output_buffers 1 32k;
	postpone_output 1460;

	# Proxy settings
	proxy_http_version 1.1;
	proxy_ignore_client_abort on;
	proxy_read_timeout 240;
	proxy_connect_timeout 60;
	proxy_send_timeout 240;
	proxy_buffering on;
	proxy_buffer_size 128k;
	proxy_buffers 4 256k;
	proxy_busy_buffers_size 256k;

	# Cache configuration
	proxy_cache_path /var/cache/nginx/hcm-dashboard keys_zone=hcmcache:10m inactive=30d max_size=100m;
	proxy_cache_methods GET HEAD POST;
	proxy_cache_key $request_uri|$request_body;
	proxy_ignore_headers Cache-Control Expires;
	proxy_cache_valid any 1y;
	proxy_cache_min_uses 1;
	proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

	# File cache
	open_file_cache max=200000 inactive=20s;
	open_file_cache_valid 30s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;

	upstream optserver {
		least_conn;
		server 0.0.0.0:8001 max_fails=3 fail_timeout=30s;
		keepalive 8;
	}

	# HTTP redirect to HTTPS
	server {
		listen 80;
		server_name hcm-dashboard.optimal-lab.com;
		return 301 https://$server_name$request_uri;
	}

	server {
		listen 443 ssl http2;
		server_name hcm-dashboard.optimal-lab.com;

		# SSL configuration
		ssl_certificate      /etc/letsencrypt/live/hcm-dashboard.optimal-lab.com/fullchain.pem;
		ssl_certificate_key  /etc/letsencrypt/live/hcm-dashboard.optimal-lab.com/privkey.pem;
		ssl_protocols        TLSv1.2 TLSv1.3;
		ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
		ssl_prefer_server_ciphers on;
		ssl_session_cache    shared:SSL:50m;
		ssl_session_timeout  1d;
		ssl_session_tickets  off;

		# OCSP stapling
		ssl_stapling on;
		ssl_stapling_verify on;
		ssl_trusted_certificate /etc/letsencrypt/live/hcm-dashboard.optimal-lab.com/chain.pem;
		resolver 8.8.8.8 8.8.4.4 valid=300s;
		resolver_timeout 5s;

		# Security headers
		add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
		add_header X-Frame-Options "SAMEORIGIN" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-XSS-Protection "1; mode=block" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;
		add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

		root /var/www/hcm-dashboard/public/;
		index html/data.html;

		# Rate limiting for general requests
		limit_req zone=general burst=20 nodelay;

		# Main location block
		location / {
			try_files $uri $uri/ =404;
		}

		location = / {
			return 302 /data;
		}

		location ~ ^/(recommendations|report|data|method|about)$ {
			alias /var/www/hcm-dashboard/public/html$uri.html;
			default_type "text/html";
		}

		# API endpoint with rate limiting
		location /api {
			limit_req zone=api burst=10 nodelay;

			proxy_pass http://optserver;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header Connection "";

			proxy_cache hcmcache;
			proxy_cache_bypass $http_pragma $http_authorization;
			add_header X-Cache-Status $upstream_cache_status always;
		}

		# Security: Block access to sensitive files
		location ~ /\. {
			deny all;
		}

		location ~ ~$ {
			deny all;
		}

		# Custom error pages
		error_page 404 /error-404.html;
		error_page 500 502 503 504 /error-500.html;

		location = /error-404.html {
			internal;
		}

		location = /error-500.html {
			internal;
		}
	}
}
